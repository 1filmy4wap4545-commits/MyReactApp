workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini
    
    environment:
      node: 16
      flutter: stable
      xcode: latest
    
    scripts:
      - name: Install dependencies
        script: |
          npm install
          
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    
